<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações do World Monitor</title>
  </head>
  <body>
    <div class="settings-shell">
      <div class="settings-tabs" role="tablist">
        <button class="settings-tab active" role="tab" aria-selected="true" aria-controls="tabPanelKeys" data-tab="keys">Chaves de API</button>
        <button class="settings-tab" role="tab" aria-selected="false" aria-controls="tabPanelDebug" data-tab="debug">Depuração e Logs</button>
      </div>
      <p id="settingsActionStatus" class="settings-action-status" aria-live="polite"></p>
      <div class="settings-tab-panels">
        <div id="tabPanelKeys" class="settings-tab-panel active" role="tabpanel">
          <main id="settingsApp" class="settings-content"></main>
        </div>
        <div id="tabPanelDebug" class="settings-tab-panel" role="tabpanel">
          <div class="debug-actions">
            <button id="openLogsBtn" type="button">Abrir pasta de logs</button>
            <button id="openSidecarLogBtn" type="button">Abrir log da API</button>
          </div>
          <section class="settings-diagnostics" id="diagnosticsSection">
            <header class="diag-header">
              <h2>Diagnósticos</h2>
              <div class="diag-toggles">
                <label><input type="checkbox" id="verboseApiLog"> Log detalhado do Sidecar</label>
                <label><input type="checkbox" id="fetchDebugLog"> Depuração de fetch do frontend</label>
              </div>
            </header>
            <div class="diag-traffic-bar">
              <h3>Tráfego da API <span id="trafficCount"></span></h3>
              <div class="diag-traffic-controls">
                <label><input type="checkbox" id="autoRefreshLog" checked> Automático</label>
                <button id="refreshLogBtn" type="button">Atualizar</button>
                <button id="clearLogBtn" type="button">Limpar</button>
              </div>
            </div>
            <div id="trafficLog" class="diag-traffic-log"></div>
          </section>
        </div>
      </div>
      <footer class="settings-footer">
        <button id="cancelBtn" type="button" class="settings-btn settings-btn-secondary">Cancelar</button>
        <button id="okBtn" type="button" class="settings-btn settings-btn-primary">OK</button>
      </footer>
    </div>

    <script type="module" src="/src/settings-main.ts"></script>
  </body>
</html>
